<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Integrantes</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #f5f5f5, #ececec);
      min-height:100vh;
      padding:40px 20px;
      color:#333;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .header{
      text-align:center;
      margin-bottom:40px;
    }

    .logo{
      width:240px;
      max-width:100%;
      margin-bottom:20px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
    }

    .title{
      font-size:64px;
      font-weight:800;
      margin-bottom:12px;
    }

    .subtitle{
      color:#6b7280;
      font-size:26px;
    }

    .search-container{
      margin-bottom:35px;
    }

    .search-input{
      width:100%;
      border:none;
      outline:none;
      background:white;
      padding:24px 28px;
      font-size:24px;
      border-radius:22px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .search-input:focus{
      transform:scale(1.01);
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
    }

    .results{
      display:flex;
      flex-direction:column;
      gap:24px;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:28px;
      display:flex;
      align-items:center;
      gap:24px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-4px);
    }

    .avatar{
      width:78px;
      height:78px;
      border-radius:50%;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:32px;
      font-weight:bold;
    }

    .card-content{
      flex:1;
    }

    .name{
      font-size:36px;
      font-weight:700;
      margin-bottom:18px;
    }

    .info{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      font-size:22px;
      color:#374151;
    }

    .badge{
      padding:10px 18px;
      border-radius:14px;
      color:white;
      font-weight:bold;
    }

    .azul{
      background:#2563eb;
    }

    .verde{
      background:#16a34a;
    }

    .rojo{
      background:#dc2626;
    }

    .amarillo{
      background:#facc15;
      color:black;
    }

    .fucsia{
      background:#FF00FF;
    }

    .naranja{
      background:#f97316;
    }

    .footer{
      margin-top:50px;
      text-align:center;
      color:#6b7280;
      font-size:18px;
    }

    @media(max-width:768px){

      .title{
        font-size:42px;
      }

      .subtitle{
        font-size:20px;
      }

      .card{
        flex-direction:column;
        text-align:center;
      }

      .name{
        font-size:28px;
      }

      .info{
        flex-direction:column;
        font-size:18px;
      }

      .search-input{
        font-size:20px;
        padding:18px;
      }

    }

  </style>
</head>
<body>

<div class="container">

  <div class="header">

    <img src="logo_hh.png" class="logo" alt="Logo">

    <h1 class="title">Buscador de Integrantes</h1>

    <p class="subtitle">
      Busca por nombre o número de acción
    </p>

  </div>

  <div class="search-container">

    <input 
      type="text" 
      id="search" 
      class="search-input"
      placeholder="Buscar por nombre o acción..."
    >

  </div>

  <div id="results" class="results"></div>

  <div class="footer">
    Hogar Hispano de Valencia<br>
    Todos los derechos reservados.
  </div>

</div>

<script>

fetch('equipos_colores_capitanes_con_accion.json')
  .then(res => res.json())
  .then(data => {

    const allMembers = [];

    data.forEach(team => {

      team.members.forEach(member => {

        allMembers.push({
          nombre: member.nombre,
          accion: member.accion,
          color: team.color,
          captain: team.captain
        });

      });

    });

    const searchInput = document.getElementById('search');
    const results = document.getElementById('results');

    function getColorClass(color){

      const map = {
        'Azul':'azul',
        'Verde':'verde',
        'Rojo':'rojo',
        'Amarillo':'amarillo',
        'Fucsia':'fucsia',
        'Naranja':'naranja'
      };

      return map[color] || 'azul';

    }

    function render(list){

      results.innerHTML = '';

      list.forEach(person => {

        const colorClass = getColorClass(person.color);

        results.innerHTML += `

          <div class="card">

            <div class="avatar ${colorClass}">
              👤
            </div>

            <div class="card-content">

              <div class="name">
                ${person.nombre}
              </div>

              <div class="info">

                <div>
                  <strong>Acción:</strong>
                  ${person.accion || 'N/A'}
                </div>

                <div>
                  <span class="badge ${colorClass}">
                    ${person.color}
                  </span>
                </div>

                <div>
                  <strong>Capitán:</strong>
                  ${person.captain}
                </div>

              </div>

            </div>

          </div>

        `;

      });

    }

    render(allMembers);

    searchInput.addEventListener('input', e => {

      const value = e.target.value.toLowerCase();

      const filtered = allMembers.filter(person =>

        String(person.nombre)
          .toLowerCase()
          .includes(value)

        ||

String(person.accion)
  .toLowerCase()
  .includes(value)

      );

      render(filtered);

    });

  });

</script>

</body>
</html>
