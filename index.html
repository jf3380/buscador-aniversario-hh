<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Integrantes</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:40px;
    }

    h1{
      text-align:center;
    }

    input{
      width:100%;
      padding:15px;
      font-size:18px;
      margin-bottom:20px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:15px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }


    body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f4f4f4, #e9e9e9);
  margin:0;
  padding:40px 20px;
  color:#222;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:35px;
}

.logo{
  width:220px;
  max-width:100%;
  margin-bottom:15px;
}

.title{
  font-size:56px;
  font-weight:bold;
  margin:0;
  color:#111827;
}

.subtitle{
  font-size:24px;
  color:#6b7280;
  margin-top:10px;
}

.search-box{
  margin-bottom:35px;
}

.search-input{
  width:100%;
  padding:22px 25px;
  font-size:24px;
  border:none;
  border-radius:18px;
  background:white;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  outline:none;
  transition:0.2s;
}

.search-input:focus{
  transform:scale(1.01);
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.card{
  background:white;
  border-radius:22px;
  padding:28px;
  margin-bottom:22px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.name{
  font-size:34px;
  font-weight:bold;
  margin-bottom:18px;
}

.info{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  font-size:22px;
}

.badge{
  padding:10px 18px;
  border-radius:12px;
  font-weight:bold;
  color:white;
}

.azul{
  background:#2563eb;
}

.verde{
  background:#16a34a;
}

.rojo{
  background:#dc2626;
}

.amarillo{
  background:#eab308;
  color:black;
}

.rosado{
  background:#ec4899;
}

.naranja{
  background:#f97316;
}

.footer{
  text-align:center;
  margin-top:50px;
  color:#6b7280;
  font-size:18px;
}

@media(max-width:768px){

  .title{
    font-size:38px;
  }

  .subtitle{
    font-size:20px;
  }

  .search-input{
    font-size:20px;
    padding:18px;
  }

  .name{
    font-size:28px;
  }

  .info{
    font-size:18px;
    flex-direction:column;
    gap:12px;
  }

}
  </style>
</head>
<body>

<h1>Buscador de Integrantes</h1>

<input type="text" id="search" placeholder="Buscar por nombre o acción">

<div id="results"></div>

<script>
fetch('equipos_colores_capitanes_con_accion.json')
  .then(res => res.json())
  .then(data => {

    const allMembers = [];

    data.forEach(team => {
      team.members.forEach(member => {
        allMembers.push({
          nombre: member.nombre,
          accion: member.accion,
          color: team.color,
          captain: team.captain
        });
      });
    });

    const searchInput = document.getElementById('search');
    const results = document.getElementById('results');

    function render(list){
      results.innerHTML = '';

      list.forEach(person => {
        results.innerHTML += `
          <div class="card">
            <h3>${person.nombre}</h3>
            <p><strong>Acción:</strong> ${person.accion ?? 'N/A'}</p>
            <p><strong>Equipo:</strong> ${person.color}</p>
            <p><strong>Capitán:</strong> ${person.captain}</p>
          </div>
        `;
      });
    }

    render(allMembers);

    searchInput.addEventListener('input', e => {

      const value = e.target.value.toLowerCase();

      const filtered = allMembers.filter(person =>
        String(person.nombre).toLowerCase().includes(value) ||
        String(person.accion).includes(value)
      );

      render(filtered);
    });
  });
</script>

</body>
</html>
